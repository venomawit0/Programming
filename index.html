<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coding</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      width: 100%;
      background: #333;
      color: #fff;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    header h1 {
      margin: 0 0 0 20px;
      font-size: 26px;
    }
    #adminBtn {
      background: #ff9800;
      border: none;
      padding: 10px 18px;
      font-size: 18px;
      color: #fff;
      cursor: pointer;
      border-radius: 6px;
      margin-right: 20px;
    }
    #content {
      padding: 20px 30px;
      max-width: 1000px;
      width: 100%;
      margin: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    #copyMsg {
      color: green;
      font-weight: bold;
      display: none;
    }
    #copyBtn {
      background: #2196F3;
      color: white;
      border: none;
      padding: 8px 14px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    #copyBtn:hover { background: #1976D2; }

    .main-area {
      display: flex;
      gap: 20px;
      flex: 1;
      overflow: hidden;
    }

    /* Code display */
    .code-container {
      flex: 2;
      display: flex;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      font-size: 16px;
      font-family: monospace;
      overflow: auto;
      min-height: 200px;
    }
    .line-numbers {
      background: #f0f0f0;
      color: #888;
      padding: 10px;
      text-align: right;
      user-select: none;
      border-right: 1px solid #ddd;
      min-width: 36px;
    }
    .code-content {
      padding: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
      flex: 1;
    }

    /* Right panel */
    #rightPanel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 220px;
    }

    /* Admin section — hidden by default */
    #adminSection {
      display: none;
      flex-direction: column;
      gap: 6px;
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    #adminSection textarea {
      width: 100%;
      height: 160px;
      font-size: 15px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
    }
    .admin-btns {
      display: flex;
      gap: 8px;
    }
    #sendBtn {
      flex: 1;
      padding: 10px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }
    #deleteBtn {
      flex: 1;
      padding: 10px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #e53935;
      color: white;
    }

    /* Chat — always visible */
    #chatSection {
      display: flex;
      flex-direction: column;
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    #chatSection h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
      color: #555;
    }
    #chatMessages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 8px;
      font-size: 14px;
      min-height: 80px;
    }
    #chatMessages div {
      margin-bottom: 5px;
      line-height: 1.4;
    }
    #chatMessages div.admin-msg {
      background: #fff3e0;
      border-left: 3px solid #ff9800;
      padding: 4px 6px;
      border-radius: 4px;
    }
    .chat-input-row {
      display: flex;
      gap: 6px;
    }
    #chatInput {
      flex: 1;
      padding: 8px;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    #sendChatBtn {
      padding: 8px 14px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }
    #nameDisplay {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    #changeNameBtn {
      background: none;
      border: none;
      color: #2196F3;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Coding</h1>
    <div>
      <button id="adminBtn">Admin</button>
    </div>
  </header>

  <div id="content">
    <div class="top-bar">
      <div id="copyMsg">Copied!</div>
      <button id="copyBtn">Copy</button>
    </div>
    <div class="main-area">
      <!-- Code display with line numbers -->
      <div class="code-container">
        <div id="lineNumbers" class="line-numbers"></div>
        <div id="display" class="code-content">No text available.</div>
      </div>

      <!-- Right panel -->
      <div id="rightPanel">
        <!-- Admin section (hidden unless logged in) -->
        <div id="adminSection">
          <strong style="font-size:14px;">📋 Admin Panel</strong>
          <textarea id="textInput" placeholder="Type code or text to share..."></textarea>
          <div class="admin-btns">
            <button id="sendBtn">Send</button>
            <button id="deleteBtn">Delete</button>
          </div>
        </div>

        <!-- Chat always visible -->
        <div id="chatSection">
          <h3>💬 Chat</h3>
          <div id="nameDisplay">
            Chatting as: <strong id="nameLabel">—</strong>
            <button id="changeNameBtn">change</button>
          </div>
          <div id="chatMessages"></div>
          <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Type a message..."/>
            <button id="sendChatBtn">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAJFmFo_v402cGhgJh597mYTfQYaMFyW18",
      authDomain: "programming-ff502.firebaseapp.com",
      databaseURL: "https://programming-ff502-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "programming-ff502",
      storageBucket: "programming-ff502.firebasestorage.app",
      messagingSenderId: "870645705395",
      appId: "1:870645705395:web:10b65dd5f2f86eca939ec6",
      measurementId: "G-D7FPDW7DJ9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const display = document.getElementById("display");
    const lineNumbers = document.getElementById("lineNumbers");
    const adminBtn = document.getElementById("adminBtn");
    const adminSection = document.getElementById("adminSection");
    const textInput = document.getElementById("textInput");
    const sendBtn = document.getElementById("sendBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const copyBtn = document.getElementById("copyBtn");
    const copyMsg = document.getElementById("copyMsg");
    const chatMessages = document.getElementById("chatMessages");
    const chatInput = document.getElementById("chatInput");
    const sendChatBtn = document.getElementById("sendChatBtn");
    const nameLabel = document.getElementById("nameLabel");
    const changeNameBtn = document.getElementById("changeNameBtn");

    // ── Username ──────────────────────────────────────────────
    let userName = localStorage.getItem("chatName") || null;
    if (!userName) {
      userName = prompt("Enter your name for chat:") || "Guest";
      localStorage.setItem("chatName", userName);
    }
    nameLabel.textContent = userName;

    changeNameBtn.addEventListener("click", () => {
      const n = prompt("Enter new name:", userName);
      if (n && n.trim()) {
        userName = n.trim();
        localStorage.setItem("chatName", userName);
        nameLabel.textContent = userName;
      }
    });

    // ── Admin login ───────────────────────────────────────────
    let isAdmin = false;
    adminBtn.addEventListener("click", () => {
      if (isAdmin) {
        adminSection.style.display = "none";
        adminBtn.textContent = "Admin";
        isAdmin = false;
        return;
      }
      const pass = prompt("Enter admin password:");
      if (pass === "111") {
        adminSection.style.display = "flex";
        adminBtn.textContent = "Logout";
        isAdmin = true;
      } else {
        alert("Wrong password!");
      }
    });

    // ── Admin: Send text + post to chat ──────────────────────
    sendBtn.addEventListener("click", () => {
      const text = textInput.value;
      if (!text.trim()) return;
      const now = Date.now();
      db.ref("sharedText").set({ message: text, timestamp: now });
      db.ref("chat").push({ name: "Admin", text: text, timestamp: now, isAdmin: true });
      textInput.value = "";
    });

    // ── Admin: Delete shared text ─────────────────────────────
    deleteBtn.addEventListener("click", () => {
      if (confirm("Delete the shared text?")) {
        db.ref("sharedText").remove();
      }
    });

    // ── Copy button ───────────────────────────────────────────
    copyBtn.addEventListener("click", () => {
      const text = display.textContent;
      if (text && text !== "No text available.") {
        navigator.clipboard.writeText(text).then(() => {
          copyMsg.style.display = "block";
          setTimeout(() => copyMsg.style.display = "none", 2000);
        });
      }
    });

    // ── Listen for shared text (display + line numbers) ───────
    db.ref("sharedText").on("value", snapshot => {
      const data = snapshot.val();
      if (data && data.message) {
        const text = data.message;
        display.textContent = text;
        const lines = text.split("\n").length;
        lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join("<br>");

        // Auto-expire after 1h 20m
        if (Date.now() - data.timestamp > 80 * 60 * 1000) {
          db.ref("sharedText").remove();
        }
      } else {
        display.textContent = "No text available.";
        lineNumbers.innerHTML = "";
      }
    }, err => {
      display.textContent = "Error loading: " + err.message;
    });

    // ── Send chat message ─────────────────────────────────────
    function sendChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      db.ref("chat").push({ name: userName, text: text, timestamp: Date.now(), isAdmin: false });
      chatInput.value = "";
    }
    sendChatBtn.addEventListener("click", sendChat);
    chatInput.addEventListener("keydown", e => { if (e.key === "Enter") sendChat(); });

    // ── Listen for chat messages ──────────────────────────────
    db.ref("chat").on("child_added", snapshot => {
      const data = snapshot.val();
      if (!data) return;
      const msgDiv = document.createElement("div");
      if (data.isAdmin) msgDiv.classList.add("admin-msg");
      msgDiv.innerHTML = "<strong>" + escapeHTML(data.name) + ":</strong> " + escapeHTML(data.text);
      msgDiv.id = "msg-" + snapshot.key;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // Auto-delete after 5 minutes
      setTimeout(() => db.ref("chat/" + snapshot.key).remove(), 5 * 60 * 1000);
    });

    db.ref("chat").on("child_removed", snapshot => {
      const el = document.getElementById("msg-" + snapshot.key);
      if (el) el.remove();
    });

    // ── Helper ────────────────────────────────────────────────
    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
